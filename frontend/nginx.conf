# Image de production : sert le build statique et relaie l'API.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
    location /health {
        proxy_pass http://api:8000;
    }
    location / {
        try_files $uri /index.html;
    }
}
