# =========================================================
# CD - VulnCheck & Approve
# Déclenchée uniquement sur la branche main : construit et
# publie les images sur GitHub Container Registry (GHCR).
# Tags produits : latest + sha du commit (traçabilité), prêts
# pour un déploiement automatique futur (watchtower, ArgoCD,
# `docker compose pull` sur le serveur, etc.).
# =========================================================
name: Release (GHCR)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write   # requis pour pousser sur ghcr.io avec GITHUB_TOKEN

jobs:
  publish:
    name: Publier ${{ matrix.image.name }} sur GHCR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { name: api,      context: ./backend }
          - { name: frontend, context: ./frontend }
          - { name: airflow,  context: ./airflow }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/vulncheck-${{ matrix.image.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Construire et publier
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
