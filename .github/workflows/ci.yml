# =========================================================
# CI - VulnCheck & Approve
# Déclenchée sur chaque Pull Request et chaque push.
# Vérifie : dépendances, compilation, tests, build des images.
# Aucune image n'est publiée ici (voir release.yml).
# =========================================================
name: CI

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  backend:
    name: Backend - dépendances, compilation, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Installer les dépendances
        run: pip install -r requirements-ci.txt

      - name: Vérifier que le backend compile
        run: python -m compileall -q app tests

      - name: Exécuter les tests
        run: pytest tests -v

  frontend:
    name: Frontend - dépendances et build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier que le frontend compile (build de production)
        run: npm run build

  docker:
    name: Images Docker - construction (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      matrix:
        image:
          - { name: api,      context: ./backend }
          - { name: frontend, context: ./frontend }
          - { name: airflow,  context: ./airflow }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Construire l'image (sans publication)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: false
          tags: vulncheck-${{ matrix.image.name }}:ci
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
